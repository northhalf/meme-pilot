services:
  napcat:
    image: mlikiowa/napcat-docker:latest
    container_name: qq-meme-napcat
    restart: always
    entrypoint: ["/custom-entrypoint.sh"]
    environment:
      - ACCOUNT=${QQ_ACCOUNT:?请设置 QQ_ACCOUNT 环境变量}
      - NAPCAT_WEBUI_TOKEN=${NAPCAT_WEBUI_TOKEN:-memepilot}
      - WS_ENABLE=true
      - WS_PORT=3001
      - TZ=Asia/Shanghai
    ports:
      - "6099:6099"
    volumes:
      - ./napcat/config:/app/napcat/config
      - ./napcat/qq:/app/.config/QQ
      - ./napcat/entrypoint.sh:/custom-entrypoint.sh:ro
      - ./memes:/app/memes
    networks:
      - meme-bot-net

  bot:
    build:
      context: .
      network: host
      args:
        - http_proxy=http://127.0.0.1:10808
        - https_proxy=http://127.0.0.1:10808
      dockerfile: bot/Dockerfile
    container_name: qq-meme-bot
    restart: always
    depends_on:
      - napcat
    env_file:
      - .env
    environment:
      - BOT_HOST=0.0.0.0
      - BOT_PORT=${BOT_PORT:-8080}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:?请设置 DEEPSEEK_API_KEY 环境变量}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-v4-flash}
      - SILICONFLOW_API_KEY=${SILICONFLOW_API_KEY:?请设置 SILICONFLOW_API_KEY 环境变量}
      - SILICONFLOW_BASE_URL=${SILICONFLOW_BASE_URL:-https://api.siliconflow.cn/v1}
      - EMBEDDING_API_KEY=${EMBEDDING_API_KEY:?请设置 EMBEDDING_API_KEY 环境变量}
      - EMBEDDING_BASE_URL=${EMBEDDING_BASE_URL:-https://api.siliconflow.cn/v1}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-BAAI/bge-m3}
      - SILICONFLOW_OCR_MODEL=${SILICONFLOW_OCR_MODEL:-deepseek-ai/DeepSeek-OCR}
      - SYNC_CONCURRENCY=${SYNC_CONCURRENCY:-5}
      - TZ=Asia/Shanghai
    volumes:
      - ./memes:/app/memes
      - ./data:/app/data
      - ./log:/app/log
      - ./meme_no_text:/app/meme_no_text
    networks:
      - meme-bot-net

networks:
  meme-bot-net:
    driver: bridge
