# CD workflow
#
# 推送 v* tag 时自动构建镜像并发布到 Docker Hub：
#   1. 单元测试 + Python 语法检查
#   2. 构建 Docker 镜像
#   3. 推送到 Docker Hub（latest + sha-<commit> 标签）
#   4. 同步 README.md 到 Docker Hub 仓库描述

name: CD

on:
  push:
    tags:
      - "v*"

env:
  IMAGE_NAME: northhalf/meme-pilot

jobs:
  # ──────────────────────────────────────────────
  # Job: 测试
  #   运行单元测试和 Python 语法检查
  # ──────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          cache-dependency-glob: uv.lock

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libgl1 libglib2.0-0

      - name: Install project dependencies
        run: uv sync --frozen

      - name: Run unit tests
        run: uv run pytest tests/unit/ -v

      - name: Run syntax check
        run: uv run python -m compileall bot tests

  # ──────────────────────────────────────────────
  # Job: 构建并发布
  #   构建 Docker 镜像并推送到 Docker Hub
  # ──────────────────────────────────────────────
  publish:
    needs: test
    runs-on: ubuntu-latest
    environment: deploy   # 发布需审批

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Generate image tags
        id: meta
        run: |
          echo "tags=${{ env.IMAGE_NAME }}:latest,${{ env.IMAGE_NAME }}:sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: bot/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sync README to Docker Hub
        uses: actionhippie/pushrm@v1
        with:
          provider: dockerhub
          target: ${{ env.IMAGE_NAME }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          readme: ./README-containers.md
