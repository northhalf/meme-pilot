# CI workflow
#
# 每次推送和 PR 到 main 时自动运行：
#   1. 单元测试 + Python 语法检查
#   2. 集成测试（调用真实外部 API，需在仓库 secrets 配置 API Key；失败不阻塞构建）
#   3. 构建 Docker 镜像（仅验证，不推送）

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────
  # Job: 测试
  #   运行单元测试和 Python 语法检查
  # ──────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          cache-dependency-glob: uv.lock

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libgl1 libglib2.0-0

      - name: Install project dependencies
        run: uv sync --frozen

      - name: Run unit tests
        run: uv run pytest tests/unit/ -v

      - name: Run syntax check
        run: uv run python -m compileall bot tests

  # ──────────────────────────────────────────────
  # Job: 集成测试
  #   调用真实外部 API（DeepSeek / OpenAI 兼容 Embedding+OCR / PaddleOCR）
  #   API Key 从仓库 secrets 注入；base_url/model 为非敏感配置，用明文。
  #   缺失 Key 的测试用例自动 skip；失败不阻塞构建（build 仅依赖 unit test）。
  # ──────────────────────────────────────────────
  integration:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          cache-dependency-glob: uv.lock

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libgl1 libglib2.0-0

      - name: Install project dependencies
        run: uv sync --frozen

      - name: Run integration tests
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENAI_EMBEDDING_API_KEY: ${{ secrets.OPENAI_EMBEDDING_API_KEY }}
          OPENAI_OCR_API_KEY: ${{ secrets.OPENAI_OCR_API_KEY }}
          PADDLEOCR_ACCESS_TOKEN: ${{ secrets.PADDLEOCR_ACCESS_TOKEN }}
          # 以下为非敏感的服务端点与模型名（与 .env.example 一致）
          OPENAI_EMBEDDING_BASE_URL: https://open.bigmodel.cn/api/paas/v4
          OPENAI_EMBEDDING_MODEL: embedding-3
          OPENAI_OCR_BASE_URL: https://api.siliconflow.cn/v1
          OPENAI_OCR_MODEL: deepseek-ai/DeepSeek-OCR
        run: uv run pytest tests/integration/ -v

  # ──────────────────────────────────────────────
  # Job: 构建验证
  #   构建 Docker 镜像但不推送，确保 Dockerfile 可用
  #   仅依赖 unit test 通过；integration 失败不阻塞本 job
  # ──────────────────────────────────────────────
  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: bot/Dockerfile
          push: false
          cache-from: type=gha
