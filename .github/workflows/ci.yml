# CI workflow
#
# 每次推送和 PR 到 main 时自动运行：
#   1. 单元测试 + Python 语法检查
#   2. 构建 Docker 镜像（仅验证，不推送）

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────
  # Job: 测试
  #   运行单元测试和 Python 语法检查
  # ──────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          cache-dependency-glob: uv.lock

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libgl1 libglib2.0-0

      - name: Install project dependencies
        run: uv sync --frozen

      - name: Run unit tests
        run: uv run pytest tests/unit/ -v

      - name: Run syntax check
        run: uv run python -m compileall bot tests

  # ──────────────────────────────────────────────
  # Job: 构建验证
  #   构建 Docker 镜像但不推送，确保 Dockerfile 可用
  # ──────────────────────────────────────────────
  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: bot/Dockerfile
          push: false
          cache-from: type=gha
