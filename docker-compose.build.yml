services:
  napcat:
    image: mlikiowa/napcat-docker:latest
    container_name: qq-meme-napcat
    restart: always
    entrypoint: ["/custom-entrypoint.sh"]
    environment:
      - ACCOUNT=${QQ_ACCOUNT:?请设置 QQ_ACCOUNT 环境变量}
      - NAPCAT_WEBUI_TOKEN=${NAPCAT_WEBUI_TOKEN:-memepilot}
      - WS_ENABLE=true
      - WS_PORT=3001
      - TZ=Asia/Shanghai
    ports:
      - "127.0.0.1:6099:6099"
    volumes:
      - ./napcat/config:/app/napcat/config
      - ./napcat/qq:/app/.config/QQ
      - ./napcat/entrypoint.sh:/custom-entrypoint.sh:ro
      - ./memes:/app/memes
    networks:
      - meme-bot-net

  bot:
    build:
      context: .
      network: host
      dockerfile: bot/Dockerfile
    image: meme-pilot:local
    container_name: qq-meme-bot
    restart: always
    depends_on:
      - napcat
    env_file:
      - .env
    environment:
      - BOT_HOST=0.0.0.0
      - BOT_PORT=${BOT_PORT:-8080}
      - OPENAI_EMBEDDING_API_KEY=${OPENAI_EMBEDDING_API_KEY:?请设置 OPENAI_EMBEDDING_API_KEY 环境变量}
      - OPENAI_EMBEDDING_BASE_URL=${OPENAI_EMBEDDING_BASE_URL:-https://open.bigmodel.cn/api/paas/v4}
      - OPENAI_EMBEDDING_MODEL=${OPENAI_EMBEDDING_MODEL:-embedding-3}
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-openai}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GOOGLE_BASE_URL=${GOOGLE_BASE_URL:-}
      - GOOGLE_EMBEDDING_MODEL=${GOOGLE_EMBEDDING_MODEL:-gemini-embedding-001}
      - OPENAI_OCR_API_KEY=${OPENAI_OCR_API_KEY:-}
      - OPENAI_OCR_BASE_URL=${OPENAI_OCR_BASE_URL:-}
      - OPENAI_OCR_MODEL=${OPENAI_OCR_MODEL:-}
      - OCR_PROVIDER=${OCR_PROVIDER:-rapidocr}
      - OCR_TEXT_SCORE=${OCR_TEXT_SCORE:-0.9}
      - PADDLEOCR_ACCESS_TOKEN=${PADDLEOCR_ACCESS_TOKEN:-}
      - BAIDU_API_KEY=${BAIDU_API_KEY:-}
      - BAIDU_SECRET_KEY=${BAIDU_SECRET_KEY:-}
      - BAIDU_OCR_TYPE=${BAIDU_OCR_TYPE:-pp_ocrv6}
      - EMBEDDING_CONCURRENCY=${EMBEDDING_CONCURRENCY:-5}
      - OCR_CONCURRENCY=${OCR_CONCURRENCY:-5}
      - COMPRESS_CONCURRENCY=${COMPRESS_CONCURRENCY:-5}
      - CONVERT_TO_WEBP=${CONVERT_TO_WEBP:-true}
      - TZ=Asia/Shanghai
      # 用 mimalloc 接管进程级 malloc，抑制 glibc 碎片并主动归还 OS 页
      - LD_PRELOAD=${LD_PRELOAD:-/usr/lib/x86_64-linux-gnu/libmimalloc.so.3}
      # Python 对象改走系统 malloc(经 LD_PRELOAD 即 mimalloc)，便于空闲页被 OS 回收
      - PYTHONMALLOC=${PYTHONMALLOC:-malloc}
      # 限制 BLAS/numpy/OpenCV 线程
      - OMP_NUM_THREADS=${OMP_NUM_THREADS:-2}
      - OPENBLAS_NUM_THREADS=${OPENBLAS_NUM_THREADS:-2}
      - MKL_NUM_THREADS=${MKL_NUM_THREADS:-2}
      # 限制 onnxruntime 推理线程（经 RapidOCR EngineConfig 透传 SessionOptions）
      - ORT_INTRA_OP_NUM_THREADS=${ORT_INTRA_OP_NUM_THREADS:-2}
      - ORT_INTER_OP_NUM_THREADS=${ORT_INTER_OP_NUM_THREADS:-1}
    mem_limit: 2g
    mem_reservation: 1g
    volumes:
      - ./memes:/app/memes
      - ./data:/app/data
      - ./log:/app/log
      - ./meme_no_text:/app/meme_no_text
      - ./memes_deleted:/app/memes_deleted
      - ./memes_replaced:/app/memes_replaced
    networks:
      - meme-bot-net

networks:
  meme-bot-net:
    driver: bridge
